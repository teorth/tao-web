# Catalogue of the old interactive applets/games (from terrytao.wordpress.com/applets/),
# with a porting status for each. Descriptions of the un-ported Java applets are
# inferred from their titles/course context -- correct freely. Maintained by hand.
title: Interactive tools
description: >-
  Experimental mathematical games, simulations, and apps written (or supervised) over the years.
  Most of the older ones are Java applets that no longer run in modern browsers; this page tracks
  which have been ported to modern JavaScript, which still run elsewhere, and which are yet to be
  ported.
category_notes:
  Linear algebra: "All the linear algebra apps below were originally coded by Kim Chi Tran in 2002, in Java 1.0. [The porting of these legacy applets — a conversation transcript](apps/porting-legacy-applets.html)."
  Complex analysis: "All the complex analysis apps below were originally written by Terence Tao in Java, mostly between 1998 and 2000. [The porting of these legacy applets — a conversation transcript](apps/porting-legacy-applets.html)."
philosophy:
  - heading: "AI involvement is disclosed."
    body: >-
      These tools, and their supporting text — including this section — are produced with substantial
      AI assistance, and every page on this site that contains AI-generated content notes this (a footnote
      on each app suffices). This matches the site's "maintained (with AI assistance)" footer and the
      disclosure practice followed in the associated research papers. The AI's role is limited to *building*
      the apps and populating them with example data — not to running them: each app then executes
      deterministically in your browser and makes no LLM (or other network) calls at runtime. The only
      nondeterminism is deliberate random-number generation, such as the sampling in the
      [random-variable visualizer](apps/random-variables.html).
  - heading: "They are visual aids, not authorities."
    body: >-
      Each app is meant as a secondary, visual supplement for building intuition about a mathematical
      topic — not as a load-bearing component of a mathematical task. They are not formally verified to
      be free of bugs. Many display only deterministic mathematical concepts; a few (such as the
      [paper-diagramming applet](apps/paper-diagram.html)) instead contain subjective, LLM-generated content that is not intended
      to be authoritative. For anything that needs to be correct, consult authoritative sources such as
      textbooks, or fully-featured software such as MATLAB or numpy/SymPy. The emphasis here is on ease
      of presentation over full expressiveness.
  - heading: "They are private and self-contained by design."
    body: >-
      No app requires a login or account, and none makes external network calls — everything runs in your
      browser, and the only files an app loads are other files on this site (for instance, the
      [paper-diagram viewer](apps/paper-diagram.html) fetches additional diagram files on demand). The apps deliberately avoid heavy
      libraries and content-delivery networks, both for speed and to keep the security surface small; there
      is no tracking or analytics. Most apps store nothing between visits and start each session fresh,
      though a few may use a cookie solely to remember your own settings.
  - heading: "The code is transparent, but not a template."
    body: >-
      The source lives in the public [GitHub repository](https://github.com/teorth/tao-web) for
      transparency, and the mathematical cores are covered by automated tests — but the code is
      AI-generated, has not been reviewed line-by-line by a human, and is not optimized for readability or
      reuse. I therefore don't recommend using it as a base for your own applets. You are very welcome to
      be *inspired* by the concepts here to build your own tools; I would only ask that you not publish
      near-identical copies of these specific apps.
  - heading: "Feedback is welcome — please open an issue."
    body: >-
      Corrections and suggestions are appreciated. For fixes to content (a wrong dependency in a diagram, a
      typo, a bad example), a pull request is fine. For changes to the code, an issue is strongly preferred
      over a pull request: because the codebase is maintained primarily by AI rather than by hand,
      unreviewed code contributions — even good ones — can make it harder to keep maintaining, so I would
      rather address the underlying issue than merge a code change.
applets:
# --- Relativity (original app, first published here) ---
- name: Spacetime diagram (special relativity)
  category: Relativity
  status: original
  date: "2026-07-11"
  description: >-
    An interactive 1+1-dimensional Minkowski spacetime diagram: construct events, inertial worldlines,
    light rays, lines of simultaneity, observers, and constant-interval hyperbolae, and view them at once
    in two independently Lorentz-boostable reference frames — with relativistic Doppler colour shifts,
    energy / momentum / proper-time readouts, and a mode to “experience” a worldline's subjective time
    (co-moving frame plus a live backward-light-cone view). Includes worked scenes (twin paradox, pole and
    barn, light clock) and JSON import/export.
  url: apps/spacetime-diagram.html
  writeup:
    label: "The making of this app: a conversation transcript"
    url: apps/spacetime-diagram-making-of.html
# --- Number theory (original app, first published here) ---
- name: Gilbreath array explorer
  category: Number theory
  status: original
  date: "2026-07-11"
  description: >-
    Enter a top row — the primes, prime gaps, a single spike, or various random models — and watch the
    triangular array of successive absolute differences build up, with parity or magnitude colouring,
    a live check of Gilbreath's conjecture on the left diagonal, and a zoomed-out canvas view for large
    arrays. A companion to the paper on Gilbreath's conjecture by Zachary Chase, Zach Hunter and Terence Tao.
  url: apps/gilbreath.html
  writeup:
    label: "The making of this app: a conversation transcript"
    url: apps/gilbreath-making-of.html
- name: Gilbreath decay constants
  category: Number theory
  status: original
  date: "2026-07-14"
  description: >-
    A companion to the Gilbreath array explorer. For an exponential-random top row, the decay constant
    c_n = E a(n,j) is the expected entry at depth n. Set the depth, then watch a Monte-Carlo estimate —
    the running average of the left diagonal a(n,0) over many random pyramids — converge, plotted against
    the exactly known c_0…c_6 and Michael Ross's empirical digit-sum law c_n ≈ C·λ^{s₂(n)}/n, with a live
    sample pyramid alongside. Built on the paper by Zachary Chase, Zach Hunter and Terence Tao; the exact
    c_4–c_6 and the digit-sum law are due to M. M. Ross.
  url: apps/gilbreath-cn.html
  writeup:
    label: "The making of this app: a conversation transcript"
    url: apps/gilbreath-cn-making-of.html
# --- Probability (original app) ---
- name: Random variable visualizer
  category: Probability
  status: original
  date: "2026-07-12"
  description: >-
    An interactive realization of Tao's 2016 post “Visualising random variables”: write a
    short Excel-like program (X = Unif({1..6}), Y = Exp(3), Z = X + Y) and watch the values, empirical
    statistics, and animated Monte-Carlo plots update live — with one shared ω per tick so coupling and
    independence come out exact. Random variables, events (True/False, with an empirical probability),
    the boolean algebra of events, and local conditioning (X | E) — which spawns its own “universe” so a
    conditional can sit beside the unconditional — are all first-class. Covers the standard distributions,
    vectors and the central limit theorem, empirical statistics (mean, covariance, quantiles, entropy, …),
    conditioning by rejection sampling, multiple plot windows, and a theoretical pdf/pmf overlay, with
    classic-paradox presets (Monty Hall, Berkson, base-rate, …); a full language reference is on the page.
  url: apps/random-variables.html
  writeup:
    label: "The making of this app: a conversation transcript"
    url: apps/random-variables-making-of.html
# --- Mathematical exposition (original app) ---
- name: Paper diagram viewer
  category: Mathematical exposition
  status: original
  date: "2026-07-13"
  description: >-
    Renders a mathematical paper as an automatically laid-out dependency diagram: its theorems, lemmas,
    propositions and definitions are boxes (sized by editorial weight, coloured by kind or section), and
    an arrow runs from each prerequisite to the result whose proof uses it. Reads the paper's logical
    structure at a glance; lets you hide side results, filter by kind or weight, and edit the diagram in
    place; and exports to SVG, TikZ, quiver, Graphviz DOT, Mermaid or its own JSON format. Ships with a
    library of worked examples (Szemerédi's theorem, Fermat's Last Theorem, the Ricci-flow entropy
    formula, the Guth–Maynard and periodic-tiling papers, and more). The pre-installed diagrams are
    LLM-generated editorial readings — a visual aid for orientation, not an authoritative account.
  note: >-
    The example diagrams are LLM-generated and simplified; treat them as orientation, not ground truth.
  url: apps/paper-diagram.html
  writeup:
    label: "The making of this app: a conversation transcript"
    url: apps/paper-diagram-making-of.html
