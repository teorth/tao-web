# Catalogue of the old interactive applets/games (from terrytao.wordpress.com/applets/),
# with a porting status for each. Descriptions of the un-ported Java applets are
# inferred from their titles/course context -- correct freely. Maintained by hand.
title: Interactive tools
description: >-
  Experimental mathematical games, simulations, and apps written (or supervised) over the years.
  Most of the older ones are Java applets that no longer run in modern browsers; this page tracks
  which have been ported to modern JavaScript, which still run elsewhere, and which are yet to be
  ported.
category_notes:
  Linear algebra: All the linear algebra apps below were originally coded by Kim Chi Tran in 2002, in Java 1.0.
  Complex analysis: All the complex analysis apps below were originally written by Terence Tao in Java, mostly between 1998 and 2000.
applets:
# --- Algebra (Scratch games; still run) ---
- name: Algebra game (demo)
  category: Algebra
  status: live
  description: A Scratch demo that solves a randomly chosen linear equation in one unknown using two operations.
  url: https://scratch.mit.edu/projects/teorth/2472326
- name: Algebra game (12 levels)
  category: Algebra
  status: live
  description: A more developed Scratch version with 12 levels, emphasizing challenging, entertaining problems over routine drill.
  url: https://scratch.mit.edu/projects/teorth/2477436
- name: Algebra game (reverse construction)
  category: Algebra
  status: live
  description: A Scratch variant whose nth level is generated by playing n moves in reverse.
  url: https://scratch.mit.edu/projects/teorth/2491144
# --- Logic ---
- name: Lewis Carroll logic puzzle solver
  category: Logic
  status: live
  description: A Scratch solver for Lewis Carroll's syllogism puzzles.
  url: https://scratch.mit.edu/projects/teorth/2486639
- name: "QED: an interactive textbook for first-order logic"
  category: Logic
  status: live
  description: An interactive textbook for first-order logic, written in JavaScript, HTML, and CSS.
  url: https://teorth.github.io/QED/QED.html
  note: Source at github.com/teorth/QED.
# --- Linear algebra (Java, by Kim Chi Tran under supervision, 2002) ---
- name: Vector calculator
  category: Linear algebra
  status: ported
  year: 2002
  description: Vector addition and subtraction, scalar multiplication, an elementary row operation (v − c·w), and the dot product.
  url: apps/vector-calculator.html
  source: https://www.math.ucla.edu/~tao/resource/general/115a.3.02f/Apple1.html
- name: Gaussian elimination
  category: Linear algebra
  status: ported
  year: 2002
  description: Row-reduce a 4×5 augmented matrix by applying elementary row operations one step at a time, with an undo history and a running log.
  url: apps/gaussian-elimination.html
  source: https://www.math.ucla.edu/~tao/resource/general/115a.3.02f/Gauss.html
- name: Matrix calculator
  category: Linear algebra
  status: ported
  year: 2002
  description: Arithmetic on two matrices up to 5×5 — sums, products, powers, transpose, trace, determinant, and inverse.
  url: apps/matrix-calculator.html
  source: https://www.math.ucla.edu/~tao/resource/general/115a.3.02f/matrixCalc.html
- name: Linear transformations in R^2
  category: Linear algebra
  status: ported
  year: 2002
  description: Visualize how a 2×2 matrix transforms the plane — draw in the domain and watch the image appear in the range.
  url: apps/linear-transformations.html
  source: https://www.math.ucla.edu/~tao/resource/general/115a.3.02f/linearMap.html
- name: Eigenvalues and eigenvectors
  category: Linear algebra
  status: ported
  year: 2002
  description: Explore the eigenlines and eigenvalues of a 2×2 matrix; drag a vector, or drag the columns of the matrix directly.
  url: apps/eigenvalues.html
  source: https://www.math.ucla.edu/~tao/resource/general/115a.3.02f/EigenMap.html
- name: Gram–Schmidt orthogonalisation
  category: Linear algebra
  status: ported
  year: 2002
  description: Orthogonalise a set of vectors step by step — subtract projections and normalise, with a live inner-product table.
  url: apps/gram-schmidt.html
  source: https://www.math.ucla.edu/~tao/resource/general/115a.3.02f/GramSchmidt.html
# --- Complex analysis (Java) ---
- name: The complex plane
  category: Complex analysis
  status: ported
  year: 1998
  description: An Argand-plane sandbox — drag a complex number and watch its Cartesian and polar forms, with buttons for basic operations.
  url: apps/complex-plane.html
  source: https://www.math.ucla.edu/~tao/java/Plane.html
- name: Elementary complex maps
  category: Complex analysis
  status: ported
  year: 2000
  description: Draw a curve in the domain and see its image under w = f(z) for a range of elementary functions.
  url: apps/elementary-complex-maps.html
  source: https://www.math.ucla.edu/~tao/java/Complex.html
- name: Möbius transforms
  category: Complex analysis
  status: ported
  year: 1999
  url: apps/mobius-transforms.html
  description: Draw points, circles, and lines and watch a Möbius map w = (az+b)/(cz+d) send them to circles and lines.
  source: https://www.math.ucla.edu/~tao/java/Mobius.html
- name: Multi-valued functions
  category: Complex analysis
  status: ported
  year: 1998
  url: apps/multi-valued-functions.html
  description: Drag z and watch the several branches of the roots and the logarithm move — and swap across the branch cut.
  source: https://www.math.ucla.edu/~tao/java/Multi.html
- name: The complex derivative
  category: Complex analysis
  status: ported
  year: 1998
  url: apps/complex-derivative.html
  description: "See conformality: an analytic map acts locally like multiplication by f′(z), preserving angles."
  source: https://www.math.ucla.edu/~tao/java/Diff.html
- name: The complex integral
  category: Complex analysis
  status: ported
  year: 1998
  url: apps/complex-integral.html
  description: Draw a contour and watch the running value of ∫ f(z) dz trace out as a vector sum.
  source: https://www.math.ucla.edu/~tao/java/Integ.html
- name: Taylor and Laurent series
  category: Complex analysis
  status: ported
  year: 2007
  url: apps/taylor-laurent.html
  description: Pick a center and see the Taylor and Laurent expansions of 1/((z−1)(z−2)) and their regions of convergence.
  source: https://www.math.ucla.edu/~tao/java/Laurent.html
- name: The fundamental theorem of calculus
  category: Complex analysis
  status: ported
  year: 2000
  url: apps/fundamental-theorem.html
  description: Draw different paths between two points; their antiderivative images all end at the same place.
  source: https://www.math.ucla.edu/~tao/java/Ftoc.html
- name: The residue theorem
  category: Complex analysis
  status: ported
  year: 2000
  url: apps/residue-theorem.html
  description: Draw a contour around editable poles; the integral converges to 2πi times the enclosed residues.
  source: https://www.math.ucla.edu/~tao/java/Residue.html
- name: The argument principle
  category: Complex analysis
  status: ported
  year: 2000
  url: apps/argument-principle.html
  description: Draw a contour and count how many times its image winds around 0 — the enclosed zeros minus poles.
  source: https://www.math.ucla.edu/~tao/java/Argument.html
# --- Miscellaneous (Java) ---
- name: Besicovitch sets
  category: Miscellaneous
  status: to-port
  year: 1998
  description: Illustrates Besicovitch (Kakeya) sets — sets of measure zero containing a unit segment in every direction.
  source: https://www.math.ucla.edu/~tao/java/Besicovitch.html
- name: Conformal compactification
  category: Miscellaneous
  status: to-port
  year: 1998
  description: Visualizes the conformal compactification of the plane.
  source: https://www.math.ucla.edu/~tao/java/Compact.html
- name: Honeycombs
  category: Miscellaneous
  status: to-port
  year: 1999
  description: Interactive honeycombs modelling Littlewood–Richardson coefficients (joint with Allen Knutson).
  source: https://www.math.ucla.edu/~tao/java/Honeycomb.html
- name: Exponent calculator
  category: Miscellaneous
  status: to-port
  year: 1999
  description: A small numerical calculator utility.
  source: https://www.math.ucla.edu/~tao/java/Calculator.html
- name: Multiple choice applet
  category: Miscellaneous
  status: retired
  year: 2005
  description: A multiple-choice quiz applet, later superseded by a wiki.
  source: https://www.math.ucla.edu/~tao/java/MultipleChoice/MultipleChoice.html
