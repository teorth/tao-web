- title: Selected writing by others
  description: I also collect here some selected talks, essays, or articles by others on the interaction
    between math, AI, and proof assistants.
  entries:
  - "Jeremy Avigad, “[Mathematicians in the age of AI](https://arxiv.org/abs/2603.03684)“, Mar 2026."
