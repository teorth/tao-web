works:
- id: visualising-random-variables
  kind: short-story
  title: Visualising random variables
  year: 2016
  venue: Blog post
  tags:
  - probability
  links:
  - type: blog
    url: "https://terrytao.wordpress.com/2016/05/13/visualising-random-variables/"
  - type: applet
    url: "apps/random-variables.html"
  abstract: >-
    A blog post proposing that a random variable be visualized as an animated quantity that fluctuates
    as its underlying sample point is resampled, with coupling, independence, and conditioning all
    emerging from a single shared source of randomness. The companion interactive app (in development)
    makes these animations live.
- id: nines-of-safety-a-proposed-unit-of-measurement-of-risk
  kind: short-story
  title: "Nines of safety: a proposed unit of measurement of risk"
  year: 2021
  venue: Blog post
  tags:
  - probability
  links:
  - type: blog
    url: "https://terrytao.wordpress.com/2021/10/03/nines-of-safety-a-proposed-unit-of-measurement-of-risk/"
  abstract: >-
    Proposes measuring the safety of an activity in “nines”: k nines means the probability of an adverse
    outcome is at most 10^(−k) (so k = −log10 of the failure probability; 1, 2, 3 nines = 90%, 99%,
    99.9% safe). Independent protective measures stacked as defense in depth (the Swiss-cheese model)
    add their nines, since failure probabilities multiply; repeated exposures over time erode safety by
    about log10(m) nines after m trials. Includes a table of everyday risks in nines and the effect of
    masks, distancing, and vaccines.
- id: a-bayesian-probability-worksheet
  kind: short-story
  title: A Bayesian probability worksheet
  year: 2022
  venue: Blog post
  tags:
  - probability
  links:
  - type: blog
    url: "https://terrytao.wordpress.com/2022/10/07/a-bayesian-probability-worksheet/"
  abstract: >-
    A step-by-step worksheet for updating the odds between a null and an alternative hypothesis in light
    of new evidence: posterior odds = prior odds × likelihood ratio (Bayes factor), recovering the
    posterior probabilities. Worked through several examples (a COVID test and the base-rate fallacy,
    Monty Hall, Sleeping Beauty), stressing that the hypotheses must be stated precisely. A candidate
    for a future interactive tao-web app.
- id: qed-version-2-0-an-interactive-text-in-first-order-logic
  kind: short-story
  title: "QED version 2.0: an interactive text in first-order logic"
  year: 2018
  venue: Blog post
  tags:
  - logic
  links:
  - type: blog
    url: "https://terrytao.wordpress.com/2018/08/18/qed-version-2-0-an-interactive-text-in-first-order-logic/"
  - type: applet
    url: "https://teorth.github.io/QED/QED.html"
  - type: repository
    url: "https://github.com/teorth/QED"
  abstract: >-
    Announces version 2.0 of QED, an interactive text and game for formal logic in which the reader
    proves theorems by applying rules of inference rather than reading passively. Version 1.0 covered
    propositional logic; version 2.0 extends to first-order logic with equality — quantifiers,
    predicates and variables — and the post discusses the difficulties a hand-coded implementation runs
    into as the logic grows (pattern matching with many or infinitely many matches, and side conditions
    on variables).
- id: gamifying-algebra
  kind: short-story
  title: Gamifying algebra
  year: 2012
  venue: Blog post
  tags:
  - education
  links:
  - type: blog
    url: "https://terrytao.wordpress.com/2012/04/15/gamifying-algebra/"
  - type: applet
    url: "https://scratch.mit.edu/projects/teorth/2472326"
  abstract: >-
    Proposes turning the solving of a linear equation into a game: the player applies a restricted set
    of moves (subtract from both sides, divide, …) to isolate the unknown while the game handles the
    arithmetic, isolating the strategic thinking that makes algebra hard for beginners. Includes a quick
    Scratch prototype and envisions progressive levels reaching simultaneous equations, quadratics, and
    inequalities.
- id: new-version-of-algebra-game
  kind: short-story
  title: New version of algebra game
  year: 2012
  venue: Blog post
  tags:
  - education
  links:
  - type: blog
    url: "https://terrytao.wordpress.com/2012/04/18/new-version-of-algebra-game/"
  - type: applet
    url: "https://scratch.mit.edu/projects/teorth/2477436"
  abstract: >-
    A follow-up presenting a more developed algebra game with 12 progressively harder levels of solving
    a linear equation in one unknown, where the moves available are deliberately restricted at each
    level to turn it into a genuine puzzle. Incorporates reader feedback (a move counter, decimal
    rounding) and notes that the single-solution nature of linear equations makes them especially suited
    to this approach.
- id: would-it-be-possible-to-create-a-tool-to-automatically-di
  kind: short-story
  title: "Would it be possible to create a tool to automatically diagram papers?"
  year: 2023
  venue: Blog post
  tags:
  - machine-assisted
  links:
  - type: blog
    url: "https://terrytao.wordpress.com/2023/02/18/would-it-be-possible-to-create-a-tool-to-automatically-diagram-papers/"
  abstract: >-
    Asks whether one could automatically generate a diagram of a mathematical paper's logical structure
    — a directed graph whose nodes are the theorems, lemmas, and definitions and whose edges show which
    results feed into which. A crude version could parse LaTeX theorem/proof environments and their
    cross-references; a language model could go further, recovering dependencies stated only informally
    (“repeating the argument of Section 3”) and judging which results deserve a box. The main
    difficulties are informal proofs, implicit dependencies, and the subjective choice of what to include.
- id: gilbreath-s-conjecture-a-cramer-random-model-and-a-determin
  kind: paper
  title: "Gilbreath's conjecture: a Cramér random model and a deterministic analysis"
  coauthors:
  - Zachary Chase
  - Zach Hunter
  year: 2026
  status: preprint
  venue: "Preprint, to be submitted"
  arxiv: '2607.08712'
  tags:
  - additive-combinatorics-number-theory
  - probability
  links:
  - type: arxiv
    url: "https://arxiv.org/abs/2607.08712"
  - type: discussion
    url: "https://terrytao.wordpress.com/2026/07/11/gilbreaths-conjecture-a-cramer-random-model-and-a-deterministic-analysis/"
  - type: applet
    url: "apps/gilbreath.html"
    label: "array explorer"
  - type: applet
    url: "apps/gilbreath-cn.html"
    label: "decay-constants visualizer"
  - type: diagram
    url: "apps/paper-diagram.html?paper=gilbreath"
  abstract: >-
    Gilbreath's conjecture asserts that starting from the sequence of primes and taking successive
    absolute differences to form a triangular array, the left diagonal consists entirely of ones after
    the first row. We show that the analogue for a Cramér random model — with normalized prime gaps
    replaced by geometric random variables of logarithmic size — holds almost surely, give preliminary
    analysis of the associated continuous probabilistic model, and prove a deterministic "inverse
    theorem" isolating the obstructions to the conjecture: long blocks of zeroes, or very long shallow
    {0,d}-valued blocks for some d ≥ 2.
