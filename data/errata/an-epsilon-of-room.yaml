      \ Call a seminorm $\\| \\|$ on $C^\\infty_c({\\bf R}^d)$ good if it is a continuous function on\
      \ $C^\\infty_c(K)$ for each compact $K$ (or equivalently, the ball $\\{ f \\in C^\\infty_c(K): \\\
      |f\\| < 1 \\}$ is open in $C^\\infty_c(K)$ for each compact $K$). We then give $C^\\infty_c({\\\
      bf R}^d)$ the topology defined by all good seminorms. Clearly, this makes $C^\\infty_c({\\bf R})^d$\
      \ a (locally convex) topological vector space.”"
