  - id: second-edition-0025
    page: 76-77
    text: The informal topological argument here does not quite work as stated, for if two rectangles
      with integer horizontal lengths (say) are connected by a common horizontal line segment rather than
      a common vertical one, then the lengths do not add together as suggested in the argument. To fix
      this, one needs a more complicated colouring scheme. Namely, one colours the interiors of rectangles
      with integer horizontal lengths green, and those with integer vertical lengths red. As for the edges,
      one colours the (open) vertical edges green and the (open) horizontal edges red. There are a few
      remaining corners which are not on any open edge that remain to be coloured; these can be assigned
      either red or green arbitrarily. With this colouring, any green path between the two horizontal
      edges of the big rectangle can be used to deduce the integer horizontal length of that rectangle,
      and similarly for a red path between the two vertical edges. (There are also several other proofs,
      for instance one can induct on the number of rectangles.)
