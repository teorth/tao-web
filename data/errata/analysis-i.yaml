      to Y$ and $g: X' \\to Y'$ are considered to be unequal if they have different domains $X \\neq X'$\
      \ or different ranges $Y \\neq Y'$ (or both)”."
  - id: third-edition-0011
    page: '52'
    text: "The paragraph that “This notion of equality obeys the usual axioms (Exercise 3.3.1)” should\
      \ be replaced by the following remark: “It is not immediately apparent that Definition 3.3.7 is\
      \ compatible with the axioms of equality in Appendix A.7, although Exercise 3.3.1 below provides\
      \ evidence towards this compatibility. There are at least three ways to address this issue. One\
      \ is to regard Definition 3.3.7 as an axiom about equality of functions rather than a definition.\
      \ Another is to provide a more explicit definition of a function in which Definition 3.3.7 becomes\
      \ a theorem; for instance, one can define a function $f: X \\to Y$ to be an ordered triple $(X,Y,\
      \ G)$ consisting of a domain set $X$, a range set $Y$, and a graph $G = \\{ (x,f(x)): x \\in X\\\
      }$ that obeys the vertical line test, and use this latter graph to define the value of $f(x) \\\
      in Y$ for each element $x$ of the domain (cf. Exercise 3.5.10). A third way is to start with a mathematical\
      \ universe ${\\mathcal U}$ without any functions in it, and use Definition 3.3.7 to create a larger\
      \ extension of this universe that contains function objects that behave as specified as in Definition\
      \ 3.3.7. This final procedure however requires a bit more of the formalism of logic and model theory\
      \ than is provided by this text, and so will not be detailed here.”"
