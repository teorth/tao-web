  - id: errata-0016
    page: '143'
    text: "The proof that $1/\\alpha \\leq \\hbox{maxflow}$ is not correct as stated (the perturbations\
      \ indicated do not preserve the property of being an $\\alpha$-flow). A correct argument is as follows.\
      \ Call an edge of an $\\alpha$-flow unsaturated if it has weight strictly between 0 and $\\alpha$,\
      \ and similarly call a vertex unsaturated if its net inflow or outflow is strictly less than $\\\
      alpha$. Observe that if e is an unsaturated edge, then the final vertex u of e will either have\
      \ an unsaturated edge leading out of it (if u is unsaturated) or another unsaturated edge leading\
      \ into it (if u is saturated). Similarly, the initial vertex u’ of e will either have an unsaturated\
      \ edge leading into it (if u is unsaturated) or another unsaturated edge leading out of it (if u\
      \ is saturated). Thus, if there is at least one unsaturated edge, then by iterating the above observations,\
      \ one can find an oriented cycle along unsaturated edges with the property that at any saturated\
      \ vertex u, the number of edges flowing along the cycle into u equals the number of edges flowing\
      \ against the cycle into u, and the number of edges flowing along the cycle out of u equals the\
      \ number of edges flowing against the cycle out of u. For this cycle, one can modify the flow as\
      \ indicated in the text to reduce the number of edges in the $\\alpha$-flow."
  - id: errata-0017
    page: '137'
    text: "In the last line of Case 1, “multiply (1.47) by…” should be “raise (1.47) to the power $r'$\
      \ and then multiply by…”, and $r+r'$ should be $(r+1)r'$."
  - id: errata-0018
    page: '148'
    text: "In the first line, $\\overline{F_v} = \\overline{F_{-v}}$ should read $F_v = \\overline{F_{-v}}$."
  - id: errata-0019
    page: '180'
    text: "In the second display, $x/\\xi$ should be $x \\xi$."
  - id: errata-0020
    page: '257'
    text: "When selecting the large prime $p$, it is necessary that $p$ is larger than 2. This is needed\
      \ in order for the binomial expansion of $(1+pB)^n$ to be expressible in the desired form $\\sum_{j=0}^\\\
      infty p^j P_j(n)$ where the polynomials $P_j$ have coefficients in the p-adic integers, because\
      \ the number of times $p$ divides $p^k / k!$ can be bounded below by $k - k/(p-1)$, which goes to\
      \ infinity as $k \\to \\infty$ provided that $p$ is larger than 2."
  - id: errata-0021
