  - id: errata-0077
    page: '102'
    text: "The case $b'=b$ in the proof of Lemma 2.11 is not as trivial as claimed. However, once the\
      \ $b'=0$ case is proven, the $b'=b$ case can then be deduced as follows. Observe that the $b'=0$\
      \ bound suffices to control the portion of $\\| \\eta(t/T) u\\|_{X^{s,b}}$ for which $\\langle \\\
      tau-h(\\xi) \\rangle \\leq 1/T$, so it suffices to control $\\| P( \\eta(t/T) u) \\|_{X^{s,b}}$,\
      \ where P is the Fourier projection to the region $\\langle \\tau-h(\\xi) \\rangle \\geq 1/T$. We\
      \ split this into $\\| P(\\eta(t/T) Pu)\\|_{X^{s,b}}$ and $\\| P(\\eta(t/T) (1-P)u)\\|_{X^{s,b}}$.\
      \ For the former term, we can observe that $\\| P (e^{it\\tau_0} P u) \\|_{X^{s,b}} \\lesssim_b\
      \ \\langle T \\tau_0 \\rangle^b \\|u\\|_{X^{s,b}}$ for any frequency $\\tau_0$ (improving the bound\
      \ in the proof of the first estimate), and then by repeating the proof of the first estimate one\
      \ obtains an acceptable estimate for this term. As for the final term $\\| P(\\eta(t/T) (1-P)u)\\\
      |_{X^{s,b}}$, we bound this by $T^{1-b} \\| (\\partial_t -L) (\\eta(t/T) (1-P) u) \\|_{X^{s,0}}$.\
      \ By the Leibniz rule, the expression inside the norm splits into $\\eta(t/T) (\\partial_t -L) (1-P)\
      \ u$ and $T^{-1} \\eta'(t/T) (1-P) u$. The first term contributes at most $\\lesssim T^{1-b}\\|(\\\
      partial_t -L) (1-P) u\\|_{X^{s,0}} \\lesssim \\|u\\|_{X^{s,b}}$, while from the b’=0 theory the\
      \ second term contributes at most $T^{1-b} T^{-1} T^b \\| (1-P) u \\|_{X^{s,b}}$, and both terms\
      \ are acceptable. Finally, the composition argument to treat the $b' \\leq 0 \\leq b$ case may be\
      \ elaborated as follows. Firstly, by a smooth partition of unity it suffices to establish the claim\
      \ for smooth compactly supported $\\eta$ (as long as the bounds depend only on the width of the\
      \ support and on a $C^k$ norm for finite $k$). It is then easy to factorise $\\eta = \\eta_1 \\\
      eta_2$ where $\\eta_1,\\eta_2 \\in C^\\infty_c$ obey similar bounds to $\\eta$. Now one can compose\
      \ easily."
