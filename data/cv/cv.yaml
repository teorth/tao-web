# CV data for Terence Tao -- maintain by hand. Publications/books/teaching come from the other datasets.
profile:
  name: Terence Tao
  title: Professor of Mathematics; James and Carol Collins Chair
  institution: University of California, Los Angeles
  email: tao@math.ucla.edu
  homepage: "https://www.math.ucla.edu/~tao/"
  bio:
    short: "Terence Tao was born in Adelaide, Australia in 1975. He has been a professor of mathematics\
      \ at UCLA since 1999, having completed his PhD under Elias Stein at Princeton in 1996. Tao's areas\
      \ of research include harmonic analysis, PDE, combinatorics, and number theory. He has received\
      \ a number of awards, including the Salem Prize in 2000, the Fields Medal in 2006, the MacArthur\
      \ Fellowship in 2007, the Crafoord Prize in 2012, and the Breakthrough Prize in Mathematics in 2015.\
      \ Terence Tao also holds the James and Carol Collins Chair in mathematics at UCLA, and is a Fellow\
      \ of the Royal Society, the Australian Academy of Sciences, the National Academy of Sciences, and\
      \ the American Academy of Arts and Sciences. From 2020 to 2024, he served on the President's Council\
      \ of Advisors on Science and Technology."
    long: |-
      Terence Tao was born in Adelaide, Australia in 1975. A child prodigy, he participated in the International Mathematical Olympiad at the ages of 10, 11, and 12, winning bronze, silver, and gold medals respectively, and remains the youngest gold medalist in the competition's history. He received his B.Sc. and M.Sc. from Flinders University under Garth Gaudry, and completed his PhD in 1996 at Princeton University under Elias Stein. He joined UCLA in 1996 and has been a full professor there since 2000, where he holds the James and Carol Collins Chair.

      Tao works across a broad range of mathematics, including harmonic analysis, partial differential equations, arithmetic and geometric combinatorics, analytic number theory, random matrix theory, and compressed sensing. His many honors include the Salem Prize (2000), the Bôcher Memorial Prize (2002), the Clay Research Award (2003), the Fields Medal (2006), the SASTRA Ramanujan Prize (2006), the MacArthur Fellowship (2007), the Ostrowski Prize (2007), the Waterman Award (2008), the Nemmers Prize (2010), the King Faisal International Prize (2010), the Crafoord Prize (2012), the Royal Medal (2014), the Breakthrough Prize in Mathematics (2015), the Riemann Prize (2019), the Princess of Asturias Award (2020), the Bolyai Prize (2020), and the Grande Médaille of the French Academy of Sciences (2023); in 2026 he was appointed a Companion of the Order of Australia.

      Tao is a Fellow of the Royal Society and a member of the National Academy of Sciences, the American Academy of Arts and Sciences, the Australian Academy of Science, and several other academies. He has served on numerous editorial boards and prize committees, including the Abel Prize and Fields Medal committees, and from 2021 to 2024 served on the President's Council of Advisors on Science and Technology.
  interests:
    primary:
    - name: Oscillatory integrals and Kakeya maximal functions
      tag: kakeya-restriction
    - name: Nonlinear dispersive equations
      tag: pde
    - name: Multilinear operators (e.g. the bilinear Hilbert transform)
      tag: multilinear
    - name: Arithmetic combinatorics, and connections with number theory and ergodic theory
      tag: additive-combinatorics-number-theory
    - name: Compressed sensing
      tag: compressed-sensing
    secondary:
    - name: Representation and symplectic theory of U(n); honeycombs
      tag: honeycombs
    - name: Geometric PDE (e.g. Yang-Mills)
    - name: General relativity
    - name: General harmonic analysis
    - name: Inverse scattering, nonlinear Fourier transforms, and integrable systems for rough data
